name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"
    # branches:
    #   - main

jobs:
  submit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      # - name: Setup pnpm
      #   uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: "npm"

      - name: Install dependencies
        run: npm i

      - name: Update package.json version
        run: |
          # Extract the tag name (e.g., refs/tags/v1.2.3 -> v1.2.3)
          VERSION=${GITHUB_REF#refs/tags/}
          
          # Strip the leading 'v'
          VERSION=${VERSION#v}
          
          echo "Updating package.json to version: $VERSION"
          
          # Use node to cleanly update the package.json file
          node -e "const fs = require('fs'); const pkg = require('./package.json'); pkg.version = '$VERSION'; fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Zip extensions
        run: |
          npm run zip
          npm run zip:firefox

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          working_directory: dist
          files: "*.zip"

